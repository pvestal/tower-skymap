# Tower Skymap — paste these two blocks inside the existing HTTPS server block
# in /etc/nginx/sites-available/tower-https, next to the other /api/* locations.
#
# After editing: sudo nginx -t && sudo systemctl reload nginx

# Skymap API (FastAPI on 8410)
location /api/skymap/ {
    proxy_pass http://127.0.0.1:8410/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    client_max_body_size 20m;
}

# Direct tile/thumb file serving — bypass FastAPI, let nginx sendfile() from disk.
# Path must match SKYMAP_STORAGE_ROOT in /opt/skymap/.env
location /skymap-files/ {
    alias /mnt/10TB2/skymap/;
    autoindex off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    # Only expose thumbs and cutouts, not raw/ (raw may contain unprocessed originals)
    location ~ ^/skymap-files/(raw)/ {
        return 403;
    }
}
